      html {

      .section{
        border-bottom: 2px solid #000;

        padding-top: 3px;

      }
      
      .box{
        display:flex;
        justify-content: space-between;
        align-items: center;
        flex-direction: column;
      }
      .columnBox{
        align-items: center;
        border: 1px solid black;
        background-color:rgb(204, 249, 255);
        border-radius: 10px;
        padding: 20px;
        margin-top: 10px;

      }

      .topbox{
        position:sticky;
        top: 10px;
        left: 10px;
        background-color: white;
        padding: 1px;
        border: 1px solid black;
      }
  
      .dropdown {
        position: absolute;
        top: 20px;
        left: 20px;
      }

  
      .dropButton {
        background-color: #333;
        color: white;
        padding: 5px 10px;
        font-size: 10px;
        cursor: pointer;
        border-radius: 5px;
      }

      
      .dropdownContent {
        display: none;
        position: absolute;
        background-color:aliceblue;
        min-width: 100px;
        padding: 10px;
        border-radius: 10px;
        border: 1px solid black;
      }

      .dropdown:hover .dropdownContent {
        display:block;
      }

      .bottomNavigation {
        position: fixed;
        bottom: 0;
        left: 0px;
        width: 100%;
        background-color: #333;
        text-align: center;
        height: 50px;
      }

      .bottomNavigation a {
        color: white;
        text-decoration: none;
        margin: 20px;
        font-weight: bold;
        font-size: large;
        font: small-caps;
      }

      .bottomNavigation a:hover {
        text-decoration: underline;
      }

      h2{
        font-size: 20px;
        font-style: bold;
        font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        text-align: center;
        padding:0px;
        margin-top:5px;
      }
