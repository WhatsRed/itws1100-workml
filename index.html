      html {

      body{
        background-color:antiquewhite;

      h1 {
         text-align: center;
         margin: 0;
         padding: 0;
         font-variant: small-caps;

      .contactHeader{

      p {

      }

      .section{
        border-bottom: 2px solid #000;
        margin: 5px;
        padding-top: 3px;
        padding-bottom: 3px;
      }
      
      .box{
        display:flex;
        justify-content: space-between;
        align-items: flex-start;
        flex-direction: column;
      }

      .topbox{
        position:sticky;
        top: 10px;
        left: 1-px;
        background-color: white;
        padding: 1px;
        border: 1px solid black;
        border-radius: 10px;
      }
      /* Dropdown container */
      .dropdown {
        position: absolute;
        top: 20px;
        left: 20px;
      }

      /* Button styling */
      .dropButton {
        background-color: #333;
        color: white;
        padding: 5px 10px;
        font-size: 10px;
        cursor: pointer;
        border-radius: 5px;
      }

      
      .dropdownContent {
        display: none;
        position: absolute;
        background-color:aliceblue;
        min-width: 100px;
        padding: 10px;
        border-radius: 10px;
        border: 1px solid black;
      }

      .dropdown:hover .dropdownContent {
        display:block;
      }

      .bottomNavigation {
        position: fixed;
        bottom: 0;
        left: 0px;
        width: 100%;
        background-color: #333;
        text-align: center;
        height: 50px;
      }

      .bottomNavigation a {
        color: white;
        text-decoration: none;
        margin: 20px;
        font-weight: bold;
        font-size: large;
        font: small-caps;
      }

      .bottomNavigation a:hover {
        text-decoration: underline;
      }

      

    </style>
